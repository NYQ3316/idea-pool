name: Deploy dist/ to GitHub Pages

# =============================================================
# 工作流说明
# -------------------------------------------------------------
# 触发条件：
#   - push 到 main 分支（修改了 dist/ 或此工作流文件）
#   - 支持手动触发（workflow_dispatch）
#
# 作用：
#   - 将 main 分支的 dist/ 目录同步到 gh-pages 分支
#   - GitHub Pages 会自动从 gh-pages 构建并发布
#
# 权限：
#   - 需要 contents: write（推送 gh-pages 分支）
# =============================================================

on:
  push:
    branches:
      - main
    paths:
      - 'dist/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:    # 允许手动触发

# 防止多个工作流并发推送 gh-pages 造成冲突
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出 main 分支
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 准备发布目录
        run: |
          # 创建临时 orphan 分支的工作目录
          mkdir -p _publish
          cp -r dist/* _publish/
          cd _publish

          # 如果没有 .nojekyll，Jekyll 会忽略以 _ 开头的文件
          touch .nojekyll

      - name: 部署到 gh-pages 分支
        run: |
          cd _publish
          git init
          git add .
          git commit -m "deploy: auto-sync dist/ from main @ ${GITHUB_SHA::7}" \
            --author="github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git HEAD:gh-pages

      - name: 清理
        run: rm -rf _publish

      - name: 验证部署
        if: success()
        run: |
          echo "✅ dist/ 已同步到 gh-pages 分支"
          echo "🌐 访问地址: https://$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]' | sed 's|/|.github.io/|')/"
          echo "📊 部署状态: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: 失败通知
        if: failure()
        run: |
          echo "❌ 部署失败，请检查 Actions 日志"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
