name: Deploy dist/ to GitHub Pages

# =============================================================
# 工作流说明
# -------------------------------------------------------------
# 触发条件：
#   - push 到 main 分支（修改了 dist/ 或此工作流文件）
#   - 支持手动触发（workflow_dispatch）
#
# 作用：
#   - 使用 GitHub Actions 直接部署 dist/ 到 GitHub Pages
#   - 不依赖 gh-pages 分支，避免 Jekyll 构建问题
# =============================================================

on:
  push:
    branches:
      - main
    paths:
      - 'dist/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:    # 允许手动触发

# 防止多个工作流并发部署
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出 main 分支
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 添加 .nojekyll 标记
        run: |
          touch dist/.nojekyll

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 验证部署
        if: success()
        run: |
          echo "✅ 已部署到 GitHub Pages"
          echo "🌐 访问地址: ${{ steps.deployment.outputs.page_url }}"

      - name: 失败通知
        if: failure()
        run: |
          echo "❌ 部署失败，请检查 Actions 日志"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
