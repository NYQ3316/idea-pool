name: Deploy dist/ to GitHub Pages

# =============================================================
# 工作流说明
# -------------------------------------------------------------
# 触发条件：
#   - push 到 main 分支（修改了 dist/ 或此工作流文件）
#   - 支持手动触发（workflow_dispatch）
#
# 作用：
#   - 将 main 分支的 dist/ 目录同步到 gh-pages 分支
#   - GitHub Pages 会自动从 gh-pages 构建并发布
#
# 权限：
#   - 需要 contents: write（推送 gh-pages 分支）
# =============================================================

on:
  push:
    branches:
      - main
    paths:
      - 'dist/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:    # 允许手动触发

# 防止多个工作流并发推送 gh-pages 造成冲突
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出 main 分支
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 准备发布目录
        run: |
          # 创建临时发布目录
          mkdir -p _publish
          # 复制 dist/ 全部内容
          cp -r dist/. _publish/
          # 添加 .nojekyll 标记，避免 Jekyll 处理
          touch _publish/.nojekyll
          # 复制 .gitignore（保留忽略规则）
          cp .gitignore _publish/.gitignore 2>/dev/null || true

      - name: 部署到 gh-pages 分支
        env:
          GIT_USER_NAME: 'github-actions[bot]'
          GIT_USER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: |
          cd _publish

          # 在临时目录里配置 git（--local 只对当前仓库生效）
          git init -b main
          git config --local user.name "${GIT_USER_NAME}"
          git config --local user.email "${GIT_USER_EMAIL}"

          git add .
          git commit -m "deploy: auto-sync dist/ from main @ ${GITHUB_SHA::7}"

          # 使用 GITHUB_TOKEN 推送
          git push -f \
            https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git \
            HEAD:gh-pages

      - name: 清理
        if: always()
        run: rm -rf _publish

      - name: 验证部署
        if: success()
        run: |
          echo "✅ dist/ 已同步到 gh-pages 分支"
          echo "🌐 访问地址: https://$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]' | sed 's|/|.github.io/|')/"
          echo "📊 部署状态: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: 失败通知
        if: failure()
        run: |
          echo "❌ 部署失败，请检查 Actions 日志"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
